name: Bug
description: 系统中不符合需求或设计预期的行为
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: 复现步骤
      placeholder: |
         请详细描述缺陷的位置和操作
    validations:
      required: true
  - type: textarea
    attributes:
      label: 预期结果
      placeholder: |
         请输入预期结果
    validations:
      required: true
  - type: textarea
    attributes:
      label: 实际结果
      placeholder: |
         请输入实际结果
    validations:
      required: true
  - type: textarea
    attributes:
      label: 附件截图
      placeholder: |
         请上传相关截图
  - type: textarea
    attributes:
      label: 测试数据
      value: |
         测试账号：
         测试数据：
    validations:
      required: false
